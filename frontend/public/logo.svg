<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none">
  <defs>

    <!-- Dark cinematic background gradient -->
    <linearGradient id="dd-bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1c0d3a"/>
      <stop offset="100%" stop-color="#080213"/>
    </linearGradient>

    <!-- Unified diagonal fill across both D shapes -->
    <linearGradient id="dd-fill" x1="20" y1="26" x2="80" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ede9ff"/>
      <stop offset="35%"  stop-color="#b89cfd"/>
      <stop offset="65%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>

    <!-- Soft inner glow -->
    <radialGradient id="dd-glow" cx="50" cy="50" r="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(167,139,250,0.14)"/>
      <stop offset="100%" stop-color="rgba(91,33,182,0)"/>
    </radialGradient>

    <!-- Edge highlight on left bar top -->
    <linearGradient id="dd-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

  </defs>

  <!-- ── Rounded square background ─────────────────── -->
  <rect width="100" height="100" rx="22" fill="url(#dd-bg)"/>

  <!-- Subtle inner ambient light -->
  <ellipse cx="50" cy="48" rx="44" ry="38" fill="url(#dd-glow)"/>

  <!-- ── LEFT D ──────────────────────────────────────
       Vertical bar (x 20–27) + right-facing bowl
       Arc center: (27, 50), radius 24
       Top: (27, 26)  →  CW arc  →  Bottom: (27, 74)
       Rightmost: (51, 50) — just past center           -->
  <path d="M20 26 H27 A24 24 0 0 1 27 74 H20 Z"
        fill="url(#dd-fill)"/>

  <!-- ── RIGHT D (mirrored) ─────────────────────────
       Vertical bar (x 73–80) + left-facing bowl
       Arc center: (73, 50), radius 24
       Top: (73, 26)  →  CCW arc  →  Bottom: (73, 74)
       Leftmost: (49, 50) — just before center          -->
  <path d="M80 26 H73 A24 24 0 0 0 73 74 H80 Z"
        fill="url(#dd-fill)"/>

  <!-- ── Micro highlight on left bar leading edge ─── -->
  <rect x="20" y="26" width="2.5" height="48" rx="1"
        fill="rgba(255,255,255,0.18)"/>

  <!-- ── Micro highlight on right bar trailing edge ─ -->
  <rect x="77.5" y="26" width="2.5" height="48" rx="1"
        fill="rgba(255,255,255,0.06)"/>

  <!-- ── Outer ring: very subtle border ────────────── -->
  <rect width="100" height="100" rx="22"
        stroke="rgba(167,139,250,0.22)" stroke-width="1"/>

</svg>
