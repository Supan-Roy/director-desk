<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none">
  <defs>
    <!-- Bright silver-white body gradient -->
    <radialGradient id="body" cx="38" cy="35" r="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#e8eaf2"/>
      <stop offset="60%"  stop-color="#c8ccd8"/>
      <stop offset="85%"  stop-color="#a8aec0"/>
      <stop offset="100%" stop-color="#8890a8"/>
    </radialGradient>

    <!-- Bright silver chrome edge gradient -->
    <linearGradient id="chrome" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="20%"  stop-color="#dce0ec"/>
      <stop offset="45%"  stop-color="#9098b0"/>
      <stop offset="65%"  stop-color="#d0d4e4"/>
      <stop offset="85%"  stop-color="#7880a0"/>
      <stop offset="100%" stop-color="#e8eaf8"/>
    </linearGradient>

    <!-- Hub chrome -->
    <radialGradient id="hub" cx="44" cy="42" r="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#d8dcea"/>
      <stop offset="80%"  stop-color="#a8b0c8"/>
      <stop offset="100%" stop-color="#8890a8"/>
    </radialGradient>

    <!-- Hole fill (dark cutout) -->
    <radialGradient id="hole" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#4a5068"/>
      <stop offset="100%" stop-color="#1a1e2e"/>
    </radialGradient>

    <!-- Center bore -->
    <radialGradient id="bore" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#3a3e52"/>
      <stop offset="100%" stop-color="#10121c"/>
    </radialGradient>

    <!-- Specular top-left highlight -->
    <radialGradient id="spec" cx="30" cy="28" r="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="50%"  stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(80,90,130,0.35)"/>
    </filter>
  </defs>

  <!-- ═══ FILM REEL — bright silver-white, circular only ═══ -->

  <!-- Outer chrome border ring -->
  <circle cx="50" cy="50" r="48" fill="url(#chrome)" filter="url(#shadow)"/>

  <!-- Main reel body — bright silver-white -->
  <circle cx="50" cy="50" r="44" fill="url(#body)"/>

  <!-- ── 6 circular holes at radius 27, every 60° ─────────── -->
  <!-- Silver ring around each hole -->
  <!-- top (270°) -->
  <circle cx="50"    cy="23"   r="9"   fill="url(#chrome)"/>
  <circle cx="50"    cy="23"   r="7"   fill="url(#hole)"/>

  <!-- top-right (330°) cx=50+27*sin(60)=50+23.38, cy=50-27*cos(60)=50-13.5 -->
  <circle cx="73.4"  cy="36.5" r="9"   fill="url(#chrome)"/>
  <circle cx="73.4"  cy="36.5" r="7"   fill="url(#hole)"/>

  <!-- bottom-right (30°) -->
  <circle cx="73.4"  cy="63.5" r="9"   fill="url(#chrome)"/>
  <circle cx="73.4"  cy="63.5" r="7"   fill="url(#hole)"/>

  <!-- bottom (90°) -->
  <circle cx="50"    cy="77"   r="9"   fill="url(#chrome)"/>
  <circle cx="50"    cy="77"   r="7"   fill="url(#hole)"/>

  <!-- bottom-left (150°) -->
  <circle cx="26.6"  cy="63.5" r="9"   fill="url(#chrome)"/>
  <circle cx="26.6"  cy="63.5" r="7"   fill="url(#hole)"/>

  <!-- top-left (210°) -->
  <circle cx="26.6"  cy="36.5" r="9"   fill="url(#chrome)"/>
  <circle cx="26.6"  cy="36.5" r="7"   fill="url(#hole)"/>

  <!-- ── Center hub ─────────────────────────────────────────── -->
  <circle cx="50" cy="50" r="13" fill="url(#chrome)"/>
  <circle cx="50" cy="50" r="10" fill="url(#hub)"/>
  <circle cx="50" cy="50" r="5"  fill="url(#bore)"/>

  <!-- ── Specular overlay — top-left brightness ────────────── -->
  <circle cx="50" cy="50" r="44" fill="url(#spec)"/>

  <!-- Fine outer rim line for crispness -->
  <circle cx="50" cy="50" r="48" fill="none"
          stroke="rgba(255,255,255,0.6)" stroke-width="0.8"/>
  <circle cx="50" cy="50" r="44" fill="none"
          stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
</svg>