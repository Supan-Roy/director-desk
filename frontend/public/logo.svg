<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Premium Silver to Lavender/Accent Gradient -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#e9d5ff" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
  </defs>
  
  <!-- Viewfinder Corners (Professional Cinematography Frame) -->
  <!-- Top-Left -->
  <path d="M 22 32 L 22 22 L 32 22" fill="none" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Top-Right -->
  <path d="M 68 22 L 78 22 L 78 32" fill="none" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Bottom-Left -->
  <path d="M 22 68 L 22 78 L 32 78" fill="none" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Bottom-Right -->
  <path d="M 68 78 L 78 78 L 78 68" fill="none" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- DD Monogram (Minimalist, Typographic, and Geometric) -->
  <!-- First D -->
  <line x1="39" y1="34" x2="39" y2="66" stroke="url(#logo-grad)" stroke-width="4.5" stroke-linecap="round" />
  <path d="M 39 34 C 51 34, 51 66, 39 66" fill="none" stroke="url(#logo-grad)" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- Second D -->
  <line x1="55" y1="34" x2="55" y2="66" stroke="url(#logo-grad)" stroke-width="4.5" stroke-linecap="round" />
  <path d="M 55 34 C 67 34, 67 66, 55 66" fill="none" stroke="url(#logo-grad)" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- Central Center-Focus Crosshair -->
  <line x1="50" y1="48" x2="50" y2="52" stroke="#a78bfa" stroke-width="0.8" opacity="0.3" />
  <line x1="48" y1="50" x2="52" y2="50" stroke="#a78bfa" stroke-width="0.8" opacity="0.3" />
</svg>
