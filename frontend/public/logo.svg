<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none">
  <defs>
    <!-- Deep cinematic background -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1033"/>
      <stop offset="50%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#05030f"/>
    </linearGradient>

    <!-- Premium gold/accent gradient for main shape -->
    <linearGradient id="gold-grad" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f0ff"/>
      <stop offset="30%" stop-color="#c4b5fd"/>
      <stop offset="60%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>

    <!-- Subtle inner glow -->
    <radialGradient id="inner-glow" cx="50" cy="45" r="35" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(139,92,246,0.15)"/>
      <stop offset="100%" stop-color="rgba(91,33,182,0)"/>
    </radialGradient>

    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Frame lines gradient -->
    <linearGradient id="frame-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(139,92,246,0.6)"/>
      <stop offset="50%" stop-color="rgba(139,92,246,0.2)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0.6)"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="100" height="100" rx="24" fill="url(#bg-grad)"/>

  <!-- Subtle vignette -->
  <rect width="100" height="100" rx="24" fill="url(#inner-glow)"/>

  <!-- Film frame corners (viewfinder aesthetic) -->
  <g stroke="url(#frame-grad)" stroke-width="1.5" fill="none" opacity="0.5">
    <!-- Top-left corner -->
    <path d="M18 32 L18 18 L32 18"/>
    <!-- Top-right corner -->
    <path d="M68 18 L82 18 L82 32"/>
    <!-- Bottom-left corner -->
    <path d="M18 68 L18 82 L32 82"/>
    <!-- Bottom-right corner -->
    <path d="M68 82 L82 82 L82 68"/>
  </g>

  <!-- Central crosshair (subtle director's viewfinder) -->
  <g stroke="rgba(139,92,246,0.15)" stroke-width="0.8">
    <line x1="50" y1="24" x2="50" y2="28"/>
    <line x1="50" y1="72" x2="50" y2="76"/>
    <line x1="24" y1="50" x2="28" y2="50"/>
    <line x1="72" y1="50" x2="76" y2="50"/>
  </g>

  <!-- Main DD Monogram with depth -->
  <g filter="url(#shadow)">
    <!-- Left D -->
    <path d="M22 28 H28 A22 22 0 0 1 28 72 H22 Z" fill="url(#gold-grad)"/>
    <!-- Right D (mirrored) -->
    <path d="M78 28 H72 A22 22 0 0 0 72 72 H78 Z" fill="url(#gold-grad)"/>
  </g>

  <!-- Highlight accents on D bars -->
  <rect x="22" y="28" width="2" height="44" rx="0.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="76" y="28" width="2" height="44" rx="0.5" fill="rgba(255,255,255,0.12)"/>

  <!-- Subtle border ring -->
  <rect width="100" height="100" rx="24"
        stroke="url(#gold-grad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Inner highlight ring -->
  <rect x="4" y="4" width="92" height="92" rx="20"
        stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none"/>
</svg>